<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0d1117"/>

  <!-- Cardinal rays — gold, 3px long -->
  <rect x="7" y="0" width="2" height="3" fill="#fbbf24"/>
  <rect x="7" y="13" width="2" height="3" fill="#fbbf24"/>
  <rect x="0" y="7" width="3" height="2" fill="#fbbf24"/>
  <rect x="13" y="7" width="3" height="2" fill="#fbbf24"/>

  <!-- Diagonal rays — 2px each -->
  <rect x="2" y="2" width="2" height="1" fill="#fbbf24"/>
  <rect x="2" y="3" width="1" height="1" fill="#fbbf24"/>
  <rect x="12" y="2" width="2" height="1" fill="#fbbf24"/>
  <rect x="13" y="3" width="1" height="1" fill="#fbbf24"/>
  <rect x="2" y="12" width="1" height="1" fill="#fbbf24"/>
  <rect x="2" y="13" width="2" height="1" fill="#fbbf24"/>
  <rect x="13" y="12" width="1" height="1" fill="#fbbf24"/>
  <rect x="12" y="13" width="2" height="1" fill="#fbbf24"/>

  <!-- Ray tips — bright -->
  <rect x="7" y="0" width="2" height="1" fill="#fef3c7"/>
  <rect x="0" y="7" width="1" height="2" fill="#fef3c7"/>
  <rect x="15" y="7" width="1" height="2" fill="#fef3c7"/>
  <rect x="7" y="15" width="2" height="1" fill="#fef3c7"/>

  <!-- Disc outline — dark -->
  <rect x="5" y="4" width="6" height="1" fill="#92400e"/>
  <rect x="4" y="5" width="8" height="1" fill="#92400e"/>
  <rect x="4" y="6" width="8" height="4" fill="#92400e"/>
  <rect x="4" y="10" width="8" height="1" fill="#92400e"/>
  <rect x="5" y="11" width="6" height="1" fill="#92400e"/>

  <!-- Disc fill — gold -->
  <rect x="5" y="5" width="6" height="1" fill="#fbbf24"/>
  <rect x="5" y="6" width="6" height="4" fill="#fbbf24"/>
  <rect x="5" y="10" width="6" height="1" fill="#fbbf24"/>

  <!-- Upper highlight -->
  <rect x="5" y="5" width="3" height="1" fill="#fcd34d"/>
  <rect x="5" y="6" width="2" height="1" fill="#fcd34d"/>

  <!-- Concentric ring — dark -->
  <rect x="6" y="6" width="4" height="1" fill="#92400e"/>
  <rect x="6" y="9" width="4" height="1" fill="#92400e"/>
  <rect x="6" y="6" width="1" height="4" fill="#92400e"/>
  <rect x="9" y="6" width="1" height="4" fill="#92400e"/>

  <!-- Inner glow -->
  <rect x="7" y="7" width="2" height="2" fill="#fef3c7"/>
</svg>
